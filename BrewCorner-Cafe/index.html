<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brew Corner Cafe</title>
    <!-- LinkCss -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar Start -->
    <nav class="navbar">
        <!-- Left-Side -->
        <div class="logo">
            <div class="logo-img-container">
                 <img src="./image/cup.png" alt="BrewCorner Logo" class="logo-img">
            </div>
            <h2>BrewCorner</h2>
        </div>
        <!-- Right-Side -->
        <div class="nav-links">
            <ul class="nav-links-ul">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>
    <!-- Navbar end -->

    <!-- Banner Start-->
     <header class="banner">
        <div class="banner-contents">
            <p class="banner-text">Freshly Roasted Daily</p>
            <h2>Your Perfect Cup of Coffee</h2>
            <h2>Start Here</h2>
            <p class="banner-description">Handcrafted coffee to make your everyday mornings a little more
            special.</p>
            <button class="common-btn">Order Now</button>
        </div>
    </header>
    <!-- Banner End-->

</html>
